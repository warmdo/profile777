<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WD Log Ultimate</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins';
  margin:0;
  background:#0f172a;
  color:white;
  padding:20px;
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

select{
  padding:10px;
  border-radius:10px;
  border:none;
  background:#1e293b;
  color:white;
}

.btn{
  padding:10px 15px;
  border-radius:10px;
  border:none;
  background:linear-gradient(45deg,#3b82f6,#9333ea);
  color:white;
  cursor:pointer;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #334155;
  padding:8px;
  text-align:center;
}

th{background:#3b82f6;}

/* IMAGE */
td img{
  width:70px;
  border-radius:8px;
  cursor:pointer;
  transition:.3s;
}
td img:hover{
  transform:scale(1.1);
}

/* IMAGE MODAL */
.img-modal{
  display:none;
  position:fixed;
  left:0;top:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

.img-modal img{
  max-width:90%;
  max-height:90%;
  animation:zoom .3s;
}

@keyframes zoom{
  from{transform:scale(.7)}
  to{transform:scale(1)}
}

/* FORM MODAL */
.modal{
  display:none;
  position:fixed;
  left:0;top:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.form-box{
  background:#111827;
  padding:25px;
  border-radius:16px;
  width:350px;
}

/* INPUT */
.form-group{margin-bottom:10px;}
.form-group input,.form-group select{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#1f2937;
  color:white;
}

/* PREVIEW */
#preview{
  width:100%;
  border-radius:10px;
  margin-top:10px;
  display:none;
}

/* TOAST */
#toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  padding:10px 20px;
  border-radius:10px;
  opacity:0;
  transition:.3s;
}
#toast.show{opacity:1;}

/* LOADING */
#loading{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}
</style>
</head>

<body>

<h2>Bukti WD Web Depan</h2>

<div class="topbar">
  <select id="siteFilter"></select>
  <button class="btn" onclick="openForm()">+ Tambah</button>
</div>

<table>
<thead>
<tr>
<th>Situs</th>
<th>Jam</th>
<th>Link</th>
<th>Gambar</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="wdTableBody"></tbody>
</table>

<!-- IMAGE MODAL -->
<div id="imgModal" class="img-modal" onclick="this.style.display='none'">
  <img id="modalImg">
</div>

<!-- FORM MODAL -->
<div id="formModal" class="modal" onclick="outsideClose(event)">
<div class="form-box">
<h3 id="formTitle">Tambah</h3>

<div class="form-group">
<select id="siteSelect"></select>
</div>

<div class="form-group">
<input type="datetime-local" id="jam">
</div>

<div class="form-group">
<input id="link" placeholder="Link Bukti">
</div>

<div class="form-group">
<input id="gambar" placeholder="URL Gambar" oninput="previewImg()">
<img id="preview">
</div>

<button class="btn" onclick="save()">Simpan</button>
</div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- LOADING -->
<div id="loading">Loading...</div>

<script>
const API="https://script.google.com/macros/s/AKfycbypNc1DGe8O1IqWq9Ufibv7BDdvQlAG5mkS8PFx_TDVqzHg9uI1pgxZ9r5nqU1LRh2tHQ/exec";

let data=[],editIndex=null;

/* TOAST */
function showToast(msg){
  toast.innerText=msg;
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"),2000);
}

/* LOADING */
function showLoading(v){
  loading.style.display=v?'flex':'none';
}

/* LOAD */
async function load(){
  const res=await fetch(API);
  data=await res.json();
  render();
  updateDropdown();
}


/* DROPDOWN */
function updateDropdown(){
  const sites=[...new Set(data.map(d=>d.Situs))];
  siteFilter.innerHTML=sites.map(s=>`<option>${s}</option>`).join('');
  siteSelect.innerHTML=siteFilter.innerHTML;
}

/* RENDER */
function render(){
  const f=siteFilter.value;
  wdTableBody.innerHTML='';

  data.forEach((d,i)=>{
    if(d.Situs!==f) return;

    wdTableBody.innerHTML+=`
    <tr>
      <td>${d.Situs}</td>
      <td>${new Date(d['Jam WD']).toLocaleString()}</td>
      <td><a href="${d['Link Bukti']}" target="_blank">Link</a></td>
      <td>
        <img src="${d['Gambar']}" onclick="showImg('${d['Gambar']}')">
      </td>
      <td>
        <button onclick="edit(${i})">Edit</button>
        <button onclick="del(${i})">Hapus</button>
      </td>
    </tr>`;
  });
}

/* IMAGE CLICK */
function showImg(src){
  modalImg.src=src;
  imgModal.style.display='flex';
}

/* PREVIEW */
function previewImg(){
  preview.src=gambar.value;
  preview.style.display='block';
}

/* FORM */
function openForm(){
  editIndex=null;
  formModal.style.display='flex';
  preview.style.display='none';
}

function edit(i){
  const d=data[i];
  editIndex=i;

  formModal.style.display='flex';

  siteSelect.value=d.Situs;
  jam.value=d['Jam WD'];
  link.value=d['Link Bukti'];
  gambar.value=d['Gambar'];
  previewImg();
}

/* SAVE */
async function save(){
  if(!jam.value || !link.value){
    showToast("Data belum lengkap!");
    return;
  }

  showLoading(true);

  await fetch(`${API}?action=${editIndex!=null?'edit':'add'}&index=${editIndex}&situs=${siteSelect.value}&jam=${jam.value}&link=${link.value}&gambar=${gambar.value}`);

  showLoading(false);
  closeForm();
  showToast("Berhasil disimpan!");
  load();
}

/* DELETE */
async function del(i){
  if(confirm("Hapus data?")){
    await fetch(`${API}?action=delete&index=${i}`);
    showToast("Terhapus!");
    load();
  }
}

/* CLOSE */
function closeForm(){
  formModal.style.display='none';
}

function outsideClose(e){
  if(e.target.id==="formModal") closeForm();
}

siteFilter.onchange=render;

load();
</script>

</body>
</html>

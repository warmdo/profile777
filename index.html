<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WD Log Interaktif Otomatis</title>
<style>
body{font-family:Arial;margin:20px;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th,td{border:1px solid #ccc;padding:8px;text-align:center;}
th{background:#007bff;color:white;}
td img{width:80px;cursor:pointer;}
input,select,button{padding:5px;margin:5px 0;}
button{cursor:pointer;}
.modal{display:none;position:fixed;z-index:1000;padding-top:60px;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.8);}
.modal-content{display:block;margin:auto;max-width:90%;max-height:80%;}
.close{position:absolute;top:20px;right:35px;color:white;font-size:40px;cursor:pointer;}
input.inline{width:90%;}
</style>
</head>
<body>

<h2>WD Log 24 Jam Interaktif Otomatis</h2>

<h3>Tambah Data</h3>
<label>Pilih Situs:</label>
<select id="siteSelectAdd"></select>
<input type="datetime-local" id="jamWDAdd">
<input type="url" id="linkBuktiAdd" placeholder="Link Bukti">
<input type="url" id="gambarURLAdd" placeholder="URL Gambar">
<button onclick="addData()">Tambah</button>

<table>
<thead>
<tr><th>Situs</th><th>Jam WD</th><th>Link Bukti</th><th>Gambar</th><th>Aksi</th></tr>
</thead>
<tbody id="wdTableBody"></tbody>
</table>

<div id="imgModal" class="modal">
<span class="close" onclick="document.getElementById('imgModal').style.display='none'">&times;</span>
<img class="modal-content" id="modalImg">
</div>

<script>
const WEB_APP_URL="https://script.google.com/macros/s/AKfycbwkuSP4OqD4BzBvJoMojn_S0xIkNWggec0NleZPV1MPsXXl1GZ5yhwUaF7lqT4uf0EK/exec"; // ganti dengan URL Web App

let wdData=[];

// Format jam 24 jam
function format24Jam(datetimeStr){
  if(!datetimeStr) return '';
  const dt=new Date(datetimeStr);
  const y=dt.getFullYear(), m=String(dt.getMonth()+1).padStart(2,'0'),
        d=String(dt.getDate()).padStart(2,'0'),
        h=String(dt.getHours()).padStart(2,'0'),
        min=String(dt.getMinutes()).padStart(2,'0');
  return `${y}-${m}-${d} ${h}:${min}`;
}

// Ambil data dari Sheet
async function fetchData(){
  const res=await fetch(WEB_APP_URL);
  wdData=await res.json();
  updateDropdown(); // update situs otomatis
  renderTable();
}

// Update dropdown otomatis
function updateDropdown(){
  const select=document.getElementById('siteSelectAdd');
  const sites=[...new Set(wdData.map(d=>d.Situs))];
  select.innerHTML=sites.map(s=>`<option value="${s}">${s}</option>`).join('');
}

// Render tabel
function renderTable(){
  const tbody=document.getElementById('wdTableBody');
  tbody.innerHTML='';
  const selectedSite=document.getElementById('siteSelectAdd').value;
  wdData.forEach((item,index)=>{
    if(item.Situs!==selectedSite) return;
    const row=document.createElement('tr');
    row.innerHTML=`
      <td>${item.Situs}</td>
      <td>${format24Jam(item['Jam WD'])}</td>
      <td><a href="${item['Link Bukti']}" target="_blank">Link</a></td>
      <td><img src="${item['Gambar']}" onclick="showModal(this.src)"></td>
      <td>
        <button onclick="editRow(${index})">Edit</button>
        <button onclick="deleteRow(${index})">Hapus</button>
      </td>`;
    tbody.appendChild(row);
  });
}

// Modal gambar
function showModal(src){
  document.getElementById('modalImg').src=src;
  document.getElementById('imgModal').style.display='block';
}

// Tambah data
async function addData(){
  const situs=document.getElementById('siteSelectAdd').value;
  const jam=document.getElementById('jamWDAdd').value;
  const link=document.getElementById('linkBuktiAdd').value;
  const gambar=document.getElementById('gambarURLAdd').value;
  await fetch(`${WEB_APP_URL}?action=add&situs=${encodeURIComponent(situs)}&jam=${encodeURIComponent(jam)}&link=${encodeURIComponent(link)}&gambar=${encodeURIComponent(gambar)}`);
  document.getElementById('jamWDAdd').value='';
  document.getElementById('linkBuktiAdd').value='';
  document.getElementById('gambarURLAdd').value='';
  fetchData();
}

// Edit inline
function editRow(index){
  const item=wdData[index];
  const row=document.getElementById('wdTableBody').children[index];
  row.innerHTML=`
    <td><input class="inline" value="${item.Situs}"></td>
    <td><input class="inline" type="datetime-local" value="${item['Jam WD']}"></td>
    <td><input class="inline" type="url" value="${item['Link Bukti']}"></td>
    <td><input class="inline" type="url" value="${item['Gambar']}"></td>
    <td>
      <button onclick="saveRow(${index})">Simpan</button>
      <button onclick="fetchData()">Batal</button>
    </td>`;
}

// Simpan edit
async function saveRow(index){
  const row=document.getElementById('wdTableBody').children[index];
  const inputs=row.querySelectorAll('input');
  await fetch(`${WEB_APP_URL}?action=edit&index=${index}&situs=${encodeURIComponent(inputs[0].value)}&jam=${encodeURIComponent(inputs[1].value)}&link=${encodeURIComponent(inputs[2].value)}&gambar=${encodeURIComponent(inputs[3].value)}`);
  fetchData();
}

// Hapus data
async function deleteRow(index){
  if(confirm('Yakin ingin menghapus data ini?')){
    await fetch(`${WEB_APP_URL}?action=delete&index=${index}`);
    fetchData();
  }
}

// Update tabel saat dropdown berubah
document.getElementById('siteSelectAdd').addEventListener('change',()=>renderTable());

fetchData();
</script>

</body>
</html>
